name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"  # Run daily at midnight
  workflow_dispatch:  # Allow manual trigger
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: BingMoe
          svg_out_path: output/snake.svg

      - name: Generate Grid Background
        run: |
          cat > output/grid.svg << 'EOF'
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00FFFF;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00FFFF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00FFFF;stop-opacity:0"/>
    </linearGradient>
  </defs>
  <rect fill="#000" width="800" height="200"/>
  <g stroke="url(#gridGrad)" stroke-width="0.5" fill="none" opacity="0.3">
    <path d="M0 50 H800 M0 100 H800 M0 150 H800"/>
    <path d="M100 0 V200 M200 0 V200 M300 0 V200 M400 0 V200 M500 0 V200 M600 0 V200 M700 0 V200"/>
  </g>
  <text x="400" y="105" text-anchor="middle" fill="#00FFFF" font-family="monospace" font-size="14" opacity="0.5">CYBERPUNK MODE</text>
</svg>
EOF

      - name: Generate Profile Summary Card
        run: |
          cat > output/profile-summary-card.svg << 'EOF'
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#161B22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect fill="url(#cardGrad)" width="800" height="200" rx="10"/>
  <text x="400" y="50" text-anchor="middle" fill="#00FFFF" font-family="monospace" font-size="20" filter="url(#glow)">FULL-STACK ENGINEER</text>
  <text x="400" y="80" text-anchor="middle" fill="#06B6D4" font-family="monospace" font-size="14">ARCHITECT</text>
  <text x="400" y="130" text-anchor="middle" fill="#00FFFF" font-family="monospace" font-size="12" opacity="0.7">TypeScript | Python | Go | Next.js | Node.js</text>
  <text x="400" y="160" text-anchor="middle" fill="#00FFFF" font-family="monospace" font-size="10" opacity="0.5">Building the future with code</text>
</svg>
EOF

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Actions"
          git add output/
          git diff --staged --quiet || git commit -m "Update output assets [skip ci]"
          git push
